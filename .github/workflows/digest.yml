name: Daily digest

on:
  # '0 23 * * 0-4' UTC = 07:00 HKT Mon-Fri.
  # HKT is UTC+8 with no DST, so 23:00 UTC rolls into the next calendar day
  # in Hong Kong. Day-of-week 0-4 (Sun-Thu UTC) is therefore Mon-Fri HKT.
  # GitHub's cron scheduler can drift 5-15 minutes at peak load, and a
  # schedule trigger is auto-disabled after 60 days with no commits to the
  # repo -- the daily commit-back in this workflow keeps it active.
  schedule:
    - cron: '0 23 * * 0-4'
  workflow_dispatch: {}

concurrency:
  group: reg-radar-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    # Worst case is ~30 sequential sources each exhausting its 15s timeout
    # across retries -- 15 minutes is not enough headroom for a bad network
    # day; a hung run is still bounded well below the cron interval.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history: the push fallback rebases onto a concurrently
          # updated main, which can fail on a shallow clone.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional repo Variables (Settings -> Secrets and variables ->
          # Actions -> Variables) to swap the model / web-search tool version
          # without a code change; blank falls back to in-code defaults.
          REG_RADAR_MODEL: ${{ vars.REG_RADAR_MODEL }}
          REG_RADAR_WEB_SEARCH_TYPE: ${{ vars.REG_RADAR_WEB_SEARCH_TYPE }}
        run: python scripts/run.py

      # No [skip ci] here: this workflow has no push trigger (schedule +
      # dispatch only), so its own commit cannot retrigger it. Note the
      # Pages deploy does NOT rely on this push event -- pushes made with
      # the Actions bot token never fire push-triggered workflows, so
      # pages.yml listens for this workflow's completion (workflow_run).
      - name: Commit and push updated digest
        run: |
          git config user.name "reg-radar-bot"
          git config user.email "reg-radar-bot@users.noreply.github.com"
          git add data/ docs/ CHANGELOG-sources.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update digest"
          git push || (git pull --rebase && git push)
