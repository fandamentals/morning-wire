name: Integrity audit (daily tripwire)

# Report-only. Runs the HARD subset of scripts/audit_checks/ (the checks
# built from the 2026-07-07 first_seen/deletion incident -- see
# audit/lessons.md and audit/PLAYBOOK.md) every day and, only on a HARD
# failure, opens or updates ONE deduplicated issue so a human notices
# well before the next weekly audit Routine runs. It never writes to
# data/ or docs/, never blocks digest.yml or pages.yml, and is not a
# required status check on anything -- it exists purely to shorten the
# time-to-notice on the specific failure mode this repo has already hit
# once in production.

on:
  schedule:
    - cron: '30 22 * * *' # 06:30 HKT daily
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  tripwire:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run HARD checks
        id: audit
        run: |
          set +e
          python scripts/audit.py --ci --json > audit-result.json
          cat audit-result.json

      - name: Open/update/close tripwire issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('audit-result.json', 'utf8'));
            const allHard = result.findings.filter(f => f.mode === 'hard' && (f.severity === 'critical' || f.severity === 'could_not_run'));
            // A could_not_run caused solely by "not enough post-install history
            // yet" (see base.could_not_run's bootstrap_expected flag) is a known,
            // temporary, self-resolving state -- not something worth paging a
            // human about every day for weeks. Only genuinely alarming hard
            // findings should open/keep open an issue; scripts/audit.py's own
            // exit code (used by the human-run weekly playbook) is unaffected --
            // this filtering only changes what the unattended DAILY tripwire pages on.
            const alarming = allHard.filter(f => !(f.evidence && f.evidence.bootstrap_expected));
            const title = 'Integrity audit: HARD check failure';

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'integrity-audit',
            });
            const match = existing.data.find(i => i.title === title);

            if (alarming.length === 0) {
              if (match) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: match.number,
                  body: 'HARD checks are clean (or only showing the expected early-operation bootstrap state) as of this run -- closing.',
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: match.number, state: 'closed',
                });
              }
              return;
            }

            const body = [
              `Daily integrity tripwire found ${alarming.length} HARD-check finding(s) as of ${new Date().toISOString()}.`,
              '',
              'This is report-only -- nothing was changed. See `audit/PLAYBOOK.md` for how the',
              'weekly audit Routine should triage this, and `audit/lessons.md` (L1) for the',
              'incident this check set exists to catch.',
              '',
              ...alarming.map(f => `- **[${f.severity}]** \`${f.check}\`: ${f.title}\n  ${f.detail}`),
            ].join('\n');

            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: match.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['integrity-audit'],
              });
            }
