name: Deploy site to Pages

# Publishes docs/ to GitHub Pages on every push to main that touches it,
# self-enabling Pages on first run (enablement: true) so no Settings->Pages
# click is ever needed. NOTE: this can only succeed once the repository is
# PUBLIC -- GitHub Pages on the free plan is not available for private
# repos, so runs before the visibility flip will fail with a 403 and can be
# ignored.
on:
  # workflow_run is the trigger that matters for the daily pipeline: pushes
  # made with the Actions bot token (digest.yml's commit-back) deliberately
  # do NOT fire push-triggered workflows, so we deploy on "Daily digest"
  # completing instead. The push trigger still covers ordinary pushes to
  # docs/ (e.g. the daily enrichment session), and workflow_dispatch covers
  # manual runs.
  workflow_run:
    workflows: ["Daily digest"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths: ['docs/**']
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Skip quietly while the repository is still private (free-plan Pages
    # requires a public repo -- running would just produce a daily red X).
    if: ${{ github.event.repository.private != true }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (self-enabling)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
