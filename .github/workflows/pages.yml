name: Deploy site to Pages

# Publishes docs/ to GitHub Pages. TWO one-time manual prerequisites (see
# README "Setup"): the repository must be PUBLIC (free-plan Pages), and the
# Pages site must be created once via Settings -> Pages -> Source: "GitHub
# Actions" -- the workflow token CANNOT create the site itself (the REST
# endpoint needs repo-admin rights GITHUB_TOKEN never gets; verified: the
# first live run failed exactly there). `enablement: true` below only keeps
# an already-created site configured on subsequent runs.
on:
  # workflow_run is the trigger that matters for the daily pipeline: pushes
  # made with the Actions bot token (digest.yml's commit-back) deliberately
  # do NOT fire push-triggered workflows, so we deploy on "Daily digest"
  # completing instead. The push trigger still covers ordinary pushes to
  # docs/ (e.g. the daily enrichment session), and workflow_dispatch covers
  # manual runs.
  workflow_run:
    workflows: ["Daily digest"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths: ['docs/**']
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Skip quietly while the repository is still private (free-plan Pages
    # requires a public repo -- running would just produce a daily red X).
    if: ${{ github.event.repository.private != true }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure Pages (site must already exist -- see header comment)
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
        with:
          enablement: true

      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
